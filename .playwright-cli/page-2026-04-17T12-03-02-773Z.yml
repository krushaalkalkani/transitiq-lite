    - generic [ref=e15]:
      - generic [ref=e16]:
        - heading "Introduction" [level=2] [ref=e17]
        - paragraph [ref=e19]: TransitIQ Lite is an AI-powered campus transit assistant owned by Krushal Kalkani in Boca Raton, Florida, USA. This policy explains how we handle your information when you use TransitIQ Lite.
      - generic [ref=e20]:
        - heading "Information We Collect" [level=2] [ref=e21]
        - generic [ref=e22]:
          - paragraph [ref=e23]: We do not require user accounts or login. When you use the app, we process uploaded transit images, your typed questions, and your selected university.
          - list [ref=e24]:
            - listitem [ref=e25]: Uploaded transit images are sent to OpenAI's API for analysis and are not stored on our servers.
            - listitem [ref=e26]: Typed questions are sent to OpenAI's API for processing and are not stored by TransitIQ Lite.
            - listitem [ref=e27]: Your selected university is used only during your session to provide relevant transit context.
          - paragraph [ref=e28]: We do not store any images, questions, or answers after your session ends.
      - generic [ref=e29]:
        - heading "Third-Party Services" [level=2] [ref=e30]
        - generic [ref=e31]:
          - paragraph [ref=e32]:
            - text: We use OpenAI's GPT-4o API to analyze images and generate answers. Your uploaded images and questions are sent to OpenAI for processing. Please review OpenAI's privacy policy at
            - link "openai.com/privacy" [ref=e33] [cursor=pointer]:
              - /url: https://openai.com/privacy
            - text: .
          - paragraph [ref=e34]: We may use Vercel Analytics in the future to collect anonymous usage data such as page views and device type. No personally identifiable information would be collected.
      - generic [ref=e35]:
        - heading "Cookies" [level=2] [ref=e36]
        - paragraph [ref=e38]: We do not currently use cookies or tracking technologies. If analytics are added in the future, this policy will be updated.
      - generic [ref=e39]:
        - heading "Data Retention" [level=2] [ref=e40]
        - paragraph [ref=e42]: We do not store your data. All processing happens in real time during your session. Once you close the app, your data is gone.
      - generic [ref=e43]:
        - heading "Children's Privacy" [level=2] [ref=e44]
        - paragraph [ref=e46]: TransitIQ Lite is designed for university students. We do not knowingly collect information from children under 13.
      - generic [ref=e47]:
        - heading "Your Rights" [level=2] [ref=e48]
        - paragraph [ref=e50]: Since we do not store personal data, there is nothing to delete or export. If you have questions, contact us.
      - generic [ref=e51]:
        - heading "Changes to This Policy" [level=2] [ref=e52]
        - paragraph [ref=e54]: We may update this policy. Changes will be posted on this page with a new effective date.
